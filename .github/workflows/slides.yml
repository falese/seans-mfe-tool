name: Build Slides

on:
  push:
    branches: [main, develop]
    paths:
      - 'docs/slides/**'
  pull_request:
    paths:
      - 'docs/slides/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Build slides (HTML + PDF)
        run: |
          mkdir -p docs/slides/dist
          marp docs/slides/platform-architecture.md \
            --output docs/slides/dist/platform-architecture.html \
            --html
          marp docs/slides/platform-architecture.md \
            --output docs/slides/dist/platform-architecture.pdf \
            --allow-local-files

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: platform-slides
          path: docs/slides/dist/
          retention-days: 90

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/slides/dist/

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
