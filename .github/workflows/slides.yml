name: Build Slides

on:
  push:
    branches: [main, develop]
    paths:
      - 'docs/slides/**'
  pull_request:
    paths:
      - 'docs/slides/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build slides (HTML + PDF)
        uses: marp-team/marp-action@v2
        with:
          input: docs/slides/platform-architecture.md
          output: docs/slides/dist
          html: true        # needed for <div class="columns"> layouts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: platform-slides
          path: docs/slides/dist/
          retention-days: 90

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/slides/dist/

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
