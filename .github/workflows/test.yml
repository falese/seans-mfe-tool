name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run all tests with coverage
        run: npm test -- --ci --coverage
        env:
          CI: true
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  generator-coverage:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run generator tests with 100% coverage requirement
        run: npm test -- src/codegen/generators --coverage --collectCoverageFrom='src/codegen/generators/**/*.js'
        env:
          CI: true
      
      - name: Verify 100% coverage for generators (TDD mandate - ADR-022)
        run: |
          echo "Verifying 100% coverage for code generators..."
          npm test -- src/codegen/generators --coverage --collectCoverageFrom='src/codegen/generators/**/*.js' 2>&1 | tee coverage.log
          if ! grep -q "All files.*|.*100.*|.*100.*|.*100.*|.*100" coverage.log; then
            echo "❌ Generator coverage is below 100%"
            exit 1
          fi
          echo "✅ Generator coverage is 100%"
