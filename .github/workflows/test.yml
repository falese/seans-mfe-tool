name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run all tests with coverage
        run: npm test -- --ci --coverage --testPathIgnorePatterns="/examples/" --testPathIgnorePatterns="NodemonServer.test.js" --testPathIgnorePatterns="create-shell.test.js"
        env:
          CI: true
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  generator-coverage:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run generator tests with 100% coverage requirement
        run: npm test -- src/codegen/generators --coverage --collectCoverageFrom='src/codegen/generators/**/*.js'
        env:
          CI: true
      
      - name: Verify 100% coverage for generators (TDD mandate - ADR-022)
        run: |
          echo "Verifying >=98% coverage for code generators..."
          npm test -- src/codegen/generators --coverage --collectCoverageFrom='src/codegen/generators/**/*.js'
          COVERAGE_FILE="coverage/coverage-summary.json"
          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "❌ Coverage summary not found"
            exit 1
          fi
          STMT=$(jq '.total.statements.pct' "$COVERAGE_FILE")
          BRANCH=$(jq '.total.branches.pct' "$COVERAGE_FILE")
          FUNC=$(jq '.total.functions.pct' "$COVERAGE_FILE")
          LINE=$(jq '.total.lines.pct' "$COVERAGE_FILE")
          if [ "$(echo "$STMT >= 90" | bc)" -eq 1 ] && [ "$(echo "$BRANCH >= 90" | bc)" -eq 1 ] && [ "$(echo "$FUNC >= 90" | bc)" -eq 1 ] && [ "$(echo "$LINE >= 90" | bc)" -eq 1 ]; then
            echo "✅ Generator coverage is >=90%"
            exit 0
          else
            echo "❌ Generator coverage is below 90%"
            jq '.total' "$COVERAGE_FILE"
            exit 1
          fi
