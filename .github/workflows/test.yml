name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: |
          ./node_modules/.bin/tsc -p packages/contracts/tsconfig.json
          ./node_modules/.bin/tsc -p packages/oclif-base/tsconfig.json

      - name: Run all tests with coverage
        run: |
          set +e
          npm test -- --ci --coverage \
            --testPathIgnorePatterns="/examples/" \
            --testPathIgnorePatterns="NodemonServer.test.js" \
            --testPathIgnorePatterns="create-shell.test.js" \
            --testPathIgnorePatterns="json-contract.test.ts" \
            --testPathIgnorePatterns="remote-mfe.integration.test.ts" \
            --json --outputFile=/tmp/jest-results.json
          JEST_EXIT=$?
          exit $JEST_EXIT
        env:
          CI: true

      - name: Post test results as PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node << 'SCRIPT'
          const fs = require('fs');
          const { execSync } = require('child_process');
          try {
            const r = JSON.parse(fs.readFileSync('/tmp/jest-results.json', 'utf8'));
            const node = '${{ matrix.node-version }}';
            // jest 29 JSON reporter uses `name` for file path and `assertionResults` for tests
            const failed = r.testResults.filter(t => t.status === 'failed');
            let body = `## CI Test Results — Node ${node}\n\n`;
            body += `**Suites**: ${r.numPassedTestSuites} passed, ${r.numFailedTestSuites} failed\n`;
            body += `**Tests**: ${r.numPassedTests} passed, ${r.numFailedTests} failed\n\n`;
            if (failed.length > 0) {
              body += `### Failed suites\n\n`;
              failed.slice(0, 10).forEach(t => {
                const filePath = t.name || t.testFilePath || 'unknown';
                const rel = filePath.replace(process.cwd() + '/', '');
                body += `**${rel}**\n\n`;
                if (t.message) {
                  const lines = t.message.split('\n').filter(l => l.trim()).slice(0, 8);
                  body += `\`\`\`\n${lines.join('\n')}\n\`\`\`\n\n`;
                }
                const assertions = t.assertionResults || t.testResults || [];
                assertions.filter(tr => tr.status === 'failed').slice(0, 5).forEach(tr => {
                  body += `- \`${tr.fullName || tr.title || '(unnamed)'}\`\n`;
                  if (tr.failureMessages && tr.failureMessages[0]) {
                    const line = tr.failureMessages[0].split('\n').find(l => l.trim()) || '';
                    body += `  > ${line.trim()}\n`;
                  }
                });
                body += '\n';
              });
            } else {
              body += `All test suites passed. Exit may be from coverage threshold.\n`;
            }
            fs.writeFileSync('/tmp/pr-comment.md', body);
          } catch (e) {
            fs.writeFileSync('/tmp/pr-comment.md', `Script error: ${e.message}\n${e.stack}`);
          }
          SCRIPT
          PR_NUM="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          gh pr comment "$PR_NUM" --body-file /tmp/pr-comment.md --repo "$REPO"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
