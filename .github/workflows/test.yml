name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: |
          ./node_modules/.bin/tsc -p packages/contracts/tsconfig.json
          ./node_modules/.bin/tsc -p packages/oclif-base/tsconfig.json

      - name: Run all tests (no coverage)
        run: npm test -- --ci --testPathIgnorePatterns="/examples/" --testPathIgnorePatterns="NodemonServer.test.js" --testPathIgnorePatterns="create-shell.test.js" --testPathIgnorePatterns="json-contract.test.ts" --testPathIgnorePatterns="remote-mfe.integration.test.ts"
        env:
          CI: true

      - name: Run all tests with coverage
        run: npm test -- --ci --coverage --testPathIgnorePatterns="/examples/" --testPathIgnorePatterns="NodemonServer.test.js" --testPathIgnorePatterns="create-shell.test.js" --testPathIgnorePatterns="json-contract.test.ts" --testPathIgnorePatterns="remote-mfe.integration.test.ts"
        env:
          CI: true

      - name: Print coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "=== Coverage Summary ==="
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              ['statements','branches','functions','lines'].forEach(k => {
                const p = s[k].pct;
                const flag = p < 70 ? ' <<<' : '';
                console.log(k + ': ' + p + '%' + flag);
              });
            "
          else
            echo "No coverage-summary.json found"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
