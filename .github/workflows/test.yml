name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Patch machine-local npm reference in lock file
        run: |
          node -e "
          const https = require('https');
          const fs = require('fs');
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          const npmPkg = lock.packages['node_modules/npm'];
          if (npmPkg && npmPkg.resolved && npmPkg.resolved.startsWith('file:')) {
            const ver = npmPkg.version;
            console.log('Patching machine-local npm@' + ver + ' reference...');
            https.get('https://registry.npmjs.org/npm/' + ver, {headers: {'Accept': 'application/json'}}, res => {
              let data = '';
              res.on('data', c => data += c);
              res.on('end', () => {
                const meta = JSON.parse(data);
                npmPkg.resolved = meta.dist.tarball;
                npmPkg.integrity = meta.dist.integrity;
                fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, 2));
                console.log('Patched: ' + npmPkg.resolved);
              });
            }).on('error', e => { console.error(e.message); process.exit(1); });
          } else {
            console.log('No patch needed');
          }
          "

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: |
          ./node_modules/.bin/tsc -p packages/contracts/tsconfig.json
          ./node_modules/.bin/tsc -p packages/oclif-base/tsconfig.json

      - name: Run all tests with coverage
        run: npm test -- --ci --coverage --testPathIgnorePatterns="/examples/" --testPathIgnorePatterns="NodemonServer.test.js" --testPathIgnorePatterns="create-shell.test.js"
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
