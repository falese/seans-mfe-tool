name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run all tests with coverage
        run: npm test -- --ci --coverage --testPathIgnorePatterns="/examples/" --testPathIgnorePatterns="NodemonServer.test.js" --testPathIgnorePatterns="create-shell.test.js"
        env:
          CI: true
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  codegen-coverage:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run codegen tests with coverage requirement
        run: npm test -- src/codegen --coverage --collectCoverageFrom='src/codegen/**/*.{js,ts}' --collectCoverageFrom='!src/codegen/**/*.test.{js,ts}' --collectCoverageFrom='!src/codegen/templates/**'
        env:
          CI: true
      
      - name: Verify coverage for codegen (ADR-022)
        run: |
          echo "Verifying >=80% coverage for code generators (excluding templates)..."
          npm test -- src/codegen --coverage --collectCoverageFrom='src/codegen/**/*.{js,ts}' --collectCoverageFrom='!src/codegen/**/*.test.{js,ts}' --collectCoverageFrom='!src/codegen/templates/**'
          COVERAGE_FILE="coverage/coverage-summary.json"
          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "❌ Coverage summary not found"
            exit 1
          fi
          STMT=$(jq '.total.statements.pct' "$COVERAGE_FILE")
          BRANCH=$(jq '.total.branches.pct' "$COVERAGE_FILE")
          FUNC=$(jq '.total.functions.pct' "$COVERAGE_FILE")
          LINE=$(jq '.total.lines.pct' "$COVERAGE_FILE")
          echo "Coverage: Statements=$STMT%, Branches=$BRANCH%, Functions=$FUNC%, Lines=$LINE%"
          if [ "$(echo "$STMT >= 80" | bc)" -eq 1 ] && [ "$(echo "$BRANCH >= 80" | bc)" -eq 1 ] && [ "$(echo "$FUNC >= 80" | bc)" -eq 1 ] && [ "$(echo "$LINE >= 80" | bc)" -eq 1 ]; then
            echo "✅ Codegen coverage is >=80%"
            exit 0
          else
            echo "❌ Codegen coverage is below 80%"
            jq '.total' "$COVERAGE_FILE"
            exit 1
          fi
