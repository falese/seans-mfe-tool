name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: |
          ./node_modules/.bin/tsc -p packages/contracts/tsconfig.json
          ./node_modules/.bin/tsc -p packages/oclif-base/tsconfig.json

      - name: Run all tests with coverage
        run: |
          set +e
          npm test -- --ci --coverage \
            --testPathIgnorePatterns="/examples/" \
            --testPathIgnorePatterns="NodemonServer.test.js" \
            --testPathIgnorePatterns="create-shell.test.js" \
            --testPathIgnorePatterns="json-contract.test.ts" \
            --testPathIgnorePatterns="remote-mfe.integration.test.ts" \
            --json --outputFile=/tmp/jest-results.json
          EXIT_CODE=$?
          echo "--- Jest exit code: $EXIT_CODE ---"
          if [ -f /tmp/jest-results.json ]; then
            node -e "
              const r = require('/tmp/jest-results.json');
              const failed = r.testResults.filter(t => t.status === 'failed');
              if (failed.length === 0) {
                console.log('All test suites passed (exit code may be from coverage threshold)');
              } else {
                console.log('FAILED SUITES:');
                failed.forEach(t => {
                  console.log('  ' + t.testFilePath.replace(process.cwd(), ''));
                  (t.testResults || []).filter(tr => tr.status === 'failed').forEach(tr => {
                    console.log('    FAIL: ' + tr.fullName);
                    if (tr.failureMessages && tr.failureMessages[0]) {
                      console.log('    ' + tr.failureMessages[0].split('\n')[0]);
                    }
                  });
                });
              }
              console.log('numPassedTestSuites:', r.numPassedTestSuites, '/ numFailedTestSuites:', r.numFailedTestSuites);
              console.log('numPassedTests:', r.numPassedTests, '/ numFailedTests:', r.numFailedTests);
            "
          fi
          exit $EXIT_CODE
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
