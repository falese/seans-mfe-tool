name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Node 18 is EOL; test on supported LTS lines.
        node-version: [20.x, 22.x]

    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: |
          ./node_modules/.bin/tsc -p packages/contracts/tsconfig.json
          ./node_modules/.bin/tsc -p packages/oclif-base/tsconfig.json

      - name: Run all tests with coverage
        run: |
          set +e
          npm test -- --ci --coverage \
            --testPathIgnorePatterns="/examples/" \
            --testPathIgnorePatterns="NodemonServer.test.js" \
            --testPathIgnorePatterns="create-shell.test.js" \
            --testPathIgnorePatterns="json-contract.test.ts" \
            --testPathIgnorePatterns="remote-mfe.integration.test.ts" \
            --json --outputFile=/tmp/jest-results.json
          JEST_EXIT=$?
          exit $JEST_EXIT
        env:
          CI: true

      - name: Post test results as PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node << 'SCRIPT'
          const fs = require('fs');
          const { execSync } = require('child_process');
          try {
            const r = JSON.parse(fs.readFileSync('/tmp/jest-results.json', 'utf8'));
            const node = '${{ matrix.node-version }}';
            // jest 29 JSON reporter uses `name` for file path and `assertionResults` for tests
            const failed = r.testResults.filter(t => t.status === 'failed');
            let body = `## CI Test Results — Node ${node}\n\n`;
            body += `**Suites**: ${r.numPassedTestSuites} passed, ${r.numFailedTestSuites} failed\n`;
            body += `**Tests**: ${r.numPassedTests} passed, ${r.numFailedTests} failed\n\n`;
            if (failed.length > 0) {
              body += `### Failed suites\n\n`;
              failed.slice(0, 10).forEach(t => {
                const filePath = t.name || t.testFilePath || 'unknown';
                const rel = filePath.replace(process.cwd() + '/', '');
                body += `**${rel}**\n\n`;
                if (t.message) {
                  const lines = t.message.split('\n').filter(l => l.trim()).slice(0, 8);
                  body += `\`\`\`\n${lines.join('\n')}\n\`\`\`\n\n`;
                }
                const assertions = t.assertionResults || t.testResults || [];
                assertions.filter(tr => tr.status === 'failed').slice(0, 5).forEach(tr => {
                  body += `- \`${tr.fullName || tr.title || '(unnamed)'}\`\n`;
                  if (tr.failureMessages && tr.failureMessages[0]) {
                    const line = tr.failureMessages[0].split('\n').find(l => l.trim()) || '';
                    body += `  > ${line.trim()}\n`;
                  }
                });
                body += '\n';
              });
            } else {
              body += `All test suites passed. Exit may be from coverage threshold.\n`;
            }
            fs.writeFileSync('/tmp/pr-comment.md', body);
          } catch (e) {
            fs.writeFileSync('/tmp/pr-comment.md', `Script error: ${e.message}\n${e.stack}`);
          }
          SCRIPT
          PR_NUM="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          gh pr comment "$PR_NUM" --body-file /tmp/pr-comment.md --repo "$REPO"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  perf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run performance suite
        run: npm run test:perf | tee /tmp/perf-output.log
        env:
          CI: true

      - name: Upload perf log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-output
          path: /tmp/perf-output.log
          retention-days: 7

  doc-links:
    # Tier-1 docs link hygiene (cross-reference-standards.md). Report-only for
    # now — a clean baseline must be established (broken links tracked by G15)
    # before this is flipped to a required gate. Refs #231 (R5), #222.
    #
    # The step surfaces findings as a GitHub warning annotation but does not
    # fail the check yet. To flip to a required gate once G15 is cleared,
    # replace the step body with `run: node scripts/check-doc-links.js`.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: 20.x

      - name: Check relative doc links resolve (report-only)
        run: |
          if ! node scripts/check-doc-links.js; then
            echo "::warning title=Doc link hygiene::Broken relative doc links found (report-only; tracked by G15). Run 'npm run docs:check-links' locally."
          fi

  quality:
    # Enforce the same gates required before commit (CLAUDE.md): lint,
    # typecheck, full build, and schema drift.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Check generated schemas are committed
        run: git diff --exit-code schemas/

      - name: MFE drift gate — generator-owned files match their manifests
        # Regenerates every MFE from its mfe-manifest.yaml and fails if any
        # generator-owned file (overwrite:true — the platform-contract shims:
        # remote entry, base-mfe/*, bff/*, server.ts, public/*) has drifted.
        # Generic, platform-wide; developer-owned code is untouched (#295).
        run: npm run check:mfe-drift:check

      - name: Meridian regen invariant — generated artifacts match the manifests
        # Re-runs remote:generate across the reference fleet + derives seeds,
        # then fails on any drift (#274 discipline, #276 reference app).
        run: node examples/meridian-station/scripts/generate.mjs --check
