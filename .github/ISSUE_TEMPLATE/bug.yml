name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels: ["type: bug", "status: needs-discussion"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report Template
        
        Help us fix the issue by providing detailed information.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear description of what went wrong
      placeholder: Describe the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run command `mfe shell my-app`
        2. Edit mfe-manifest.yaml to add capability
        3. Run `mfe remote:generate`
        4. See error...
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
      placeholder: Describe expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe actual behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: System and version information
      placeholder: |
        - OS: macOS 14.0
        - Node.js: 20.10.0
        - Tool version: 1.0.0
        - Shell: zsh
      render: markdown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Include relevant error messages or stack traces
      placeholder: Paste error output here
      render: shell
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How severe is this bug?
      options:
        - priority: critical
        - priority: high
        - priority: medium
        - priority: low
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      multiple: true
      options:
        - component: cli
        - component: codegen
        - component: orchestration
        - component: bff
        - component: dsl
        - component: deployment
        - component: testing
    validations:
      required: true
