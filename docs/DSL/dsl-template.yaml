# MFE DSL Template v3.2
# Generated by: mfe remote:init
# Reference: docs/dsl-schema-reference.md

# =============================================================================
# CORE IDENTITY (Required)
# =============================================================================
name: {{name}}
version: 1.0.0
type: remote
language: typescript
description: ""
owner: ""
tags: []

# =============================================================================
# CAPABILITIES (Required - define what this MFE provides)
# =============================================================================
# Each capability becomes an exposed function in remote.tsx
# CLI generates: src/features/{CapabilityName}/{CapabilityName}.tsx
#
# Example:
#   - UserProfile:
#       type: domain
#       description: "View and manage user profile"
#
capabilities: []

# =============================================================================
# DEPENDENCIES (Optional - for Module Federation shared config)
# =============================================================================
dependencies:
  runtime:
    react: ^18.0.0
    react-dom: ^18.0.0
  design-system:
    '@mui/material': ^5.14.0

# =============================================================================
# DATA LAYER (Optional - GraphQL BFF from OpenAPI specs)
# =============================================================================
# Uncomment and configure to enable GraphQL BFF with RTK Query hooks.
# CLI runs: mfe bff:build to generate .meshrc.yaml and RTK Query API.
