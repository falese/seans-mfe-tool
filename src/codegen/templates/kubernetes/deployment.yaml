apiVersion: apps/v1
kind: Deployment
metadata:
  name: <%= name %>-deployment
  labels:
    app: <%= name %>
    type: <%= type %>
spec:
  replicas: <%= replicas || 2 %>
  selector:
    matchLabels:
      app: <%= name %>
  template:
    metadata:
      labels:
        app: <%= name %>
        type: <%= type %>
    spec:
      containers:
      - name: <%= name %>
        image: <%= registry %>/<%= name %>:latest
        ports:
        - containerPort: <%= port || 3000 %>
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "<%= port || 3000 %>"
        <% if (type === 'api') { %>
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: <%= name %>-secrets
              key: jwt-secret
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: <%= name %>-secrets
              key: database-url
        <% } %>
        resources:
          requests:
            memory: "<%= memory || '128Mi' %>"
            cpu: "<%= cpu || '100m' %>"
          limits:
            memory: "<%= memoryLimit || '512Mi' %>"
            cpu: "<%= cpuLimit || '500m' %>"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: <%= name %>-service
  labels:
    app: <%= name %>
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: <%= port || 3000 %>
    protocol: TCP
    name: http
  selector:
    app: <%= name %>
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: <%= name %>-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - <%= domain || name + '.example.com' %>
    secretName: <%= name %>-tls
  rules:
  - host: <%= domain || name + '.example.com' %>
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: <%= name %>-service
            port:
              number: 80
