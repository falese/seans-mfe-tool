apiVersion: v1
kind: ConfigMap
metadata:
  name: <%= name %>-config
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  <% if (type === 'api') { %>
  API_VERSION: "v1"
  CORS_ORIGIN: "<%= corsOrigin || '*' %>"
  <% } %>
  <% if (type === 'shell' || type === 'remote') { %>
  PUBLIC_URL: "https://<%= domain || name + '.example.com' %>"
  <% } %>
