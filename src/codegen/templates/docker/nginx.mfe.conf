# Hardened nginx server block for a generated MFE (shell or remote).
# Designed for the nginxinc/nginx-unprivileged image: runs as a non-root user
# and listens on 8080. Installed at /etc/nginx/conf.d/default.conf (ADR-044).
#
# NOTE on add_header inheritance: nginx drops ALL inherited add_header directives
# in any location that declares its own. Security headers are therefore set at
# the server level, and the HTML document location uses `expires` (not add_header)
# for cache control so it keeps those security headers.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ----- Compression --------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml font/woff2;

    # ----- Security headers (applied to the HTML document) --------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Content-Security-Policy is deployment-specific for Module Federation:
    # script-src must whitelist every remote origin the shell loads, and
    # connect-src every BFF/GraphQL endpoint. Tune and enable per environment.
    #   add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://your-remote.example; style-src 'self' 'unsafe-inline'; connect-src 'self' https://your-bff.example; img-src 'self' data:; font-src 'self' data:" always;
    #
    # HSTS should be set at the TLS-terminating edge, not on this HTTP listener:
    #   add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ----- Health check -------------------------------------------------------
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    # ----- Module Federation entry -------------------------------------------
    # remoteEntry.js is loaded cross-origin by the shell, so it needs CORS and
    # must never be cached (it points at content-hashed chunks).
    location = /remoteEntry.js {
        # Restrict to known shell origins in private deployments; '*' suits a
        # public/marketplace remote.
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
        try_files $uri =404;
    }

    # ----- Hashed static assets ----------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # ----- SPA fallback (HTML document) --------------------------------------
    # Uses `expires` rather than add_header so the security headers above are
    # still applied to the document response.
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }
}
