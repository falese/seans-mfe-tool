apiVersion: v1
kind: Secret
metadata:
  name: <%= name %>-secrets
type: Opaque
stringData:
  # IMPORTANT: Replace these placeholder values with actual secrets
  # Consider using external secret management tools like:
  # - Sealed Secrets
  # - External Secrets Operator
  # - HashiCorp Vault
  # - AWS Secrets Manager
  # - Azure Key Vault
  # - Google Secret Manager
  
  jwt-secret: "REPLACE_WITH_SECURE_JWT_SECRET"
  database-url: "REPLACE_WITH_DATABASE_CONNECTION_STRING"
  api-key: "REPLACE_WITH_API_KEY"
