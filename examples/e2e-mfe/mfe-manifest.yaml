# MFE DSL Platform Contract v3.2
# This file defines the complete platform contract that ALL MFEs must conform to
# regardless of implementation language (JavaScript, Python, Go, etc.)
#
# Session 6 Decisions Applied:
# - DEC-016: Lifecycle hooks use `contained` (not `wrapped`), mandatory/contained flags
# - DEC-017: Only 4 lifecycle phases: before, main, after, error (no custom phases)
# - DEC-018: handler can be string OR array of strings
# - DEC-019: Handler names are language-neutral, mapped by code generators
# - DEC-020: Unified type system (nullable by default, `!` for required)
# - DEC-021: Type metadata (owner, tags) for tooling and future access control
# - DEC-022: V1 supports JavaScript/TypeScript only
# - DEC-023: Data lifecycle aligns with capability lifecycle (no `loading` phase)
# - DEC-024: generatedFrom tracks data lineage for dependency analysis
#
# Session 7 Decisions Applied:
# - ADR-046: data: section IS GraphQL Mesh configuration (single source of truth)
#            CLI extracts data: → .meshrc.yaml → runs mesh build
#            Mesh provides pure passthrough from GraphQL to REST APIs
#
# Session 7 DSL-First Remote Generation:
# - capabilities[] now drives code generation (remote.tsx, features/)
# - Domain capabilities describe WHAT, not WHERE (no entryPoints in DSL)
# - CLI generates file structure from capability names
# - RTK Query auto-generated from data.sources[]
# - See: docs/dsl-remote-requirements.md, docs/dsl-schema-reference.md

# =============================================================================
# CORE IDENTITY (Required)
# =============================================================================
name: csv-analyzer
version: 1.0.0
type: tool  # tool | agent | feature | service
description: Analyzes CSV files and generates statistical summaries
owner: analytics-team
tags: [data-analysis, csv, statistics, file-processing]
category: data-processing
language: javascript  # javascript | python | go | rust | etc

# =============================================================================
# ENDPOINTS (Required)
# =============================================================================
# Base endpoint - all paths relative to this
endpoint: http://localhost:3002

# Remote entry - REQUIRED for all MFEs (abstract convention)
# Defines the entry point for dynamic loading regardless of language
# JavaScript: Module Federation remoteEntry.js
# Python: HTTP endpoint returning module descriptor JSON
# Go: HTTP endpoint returning module descriptor JSON
remoteEntry: http://localhost:3002/remoteEntry.js

# Discovery endpoint - where to find full MFE manifest
# Follows .well-known convention for discoverability
discovery: http://localhost:3002/.well-known/mfe-manifest.yaml

# =============================================================================
# STANDARD PLATFORM CAPABILITIES (Required - ALL MFEs must implement)
# =============================================================================
# These capabilities are explicitly listed to enable re-entrant evolution
# Platform can modify standard capabilities over time
capabilities:
  # 1. LOAD - Initialize the MFE runtime
  - Load:
      type: platform
      description: Initialize MFE runtime, load dependencies, and prepare for execution
      handler: initialize
      inputs:
        - name: config
          type: object
          required: false
          description: Optional configuration for initialization
      outputs:
        - name: ready
          type: boolean
          description: Whether MFE successfully initialized
        - name: loadTime
          type: number
          description: Time taken to load in milliseconds
      lifecycle:
        before:
          - validateConfig:
              handler: checkConfig
              description: Validate provided configuration
          - checkDependencies:
              handler: verifyDeps
              description: Ensure all dependencies are available
        main:
          - initializeRuntime:
              handler: setupRuntime
              description: Initialize the MFE runtime environment
        after:
          - emitReadyEvent:
              handler: notifyReady
              description: Signal that MFE is ready for use
        error:
          - cleanup:
              handler: rollbackInit
              description: Clean up partial initialization on failure

  # 2. RENDER - Display UI or return data representation
  - Render:
      type: platform
      description: Render UI component (for web MFEs) or return JSON data representation (for backend MFEs)
      handler: renderComponent
      inputs:
        - name: container
          type: element
          required: false
          description: DOM container for UI MFEs (null for backend MFEs)
        - name: props
          type: object
          required: false
          description: Properties/parameters for rendering
      outputs:
        - name: rendered
          type: component | object
          description: React/Vue component for UI MFEs, JSON data for backend MFEs
      lifecycle:
        before:
          - validateProps:
              handler: checkProps
              description: Validate rendering properties
          - checkAuthorization:
              handler: verifyAccess
              description: Verify user has permission to render
        main:
          - performRender:
              handler: renderComponent
              description: Execute render (UI component or GraphQL data query)
        after:
          - attachEventHandlers:
              handler: bindEvents
              description: Attach event handlers (UI MFEs only)
        error:
          - renderErrorBoundary:
              handler: showError
              description: Display error state or return error response

  # 3. REFRESH - Reload/update MFE state
  - Refresh:
      type: platform
      description: Reload MFE data or re-render UI with fresh state
      handler: refreshState
      inputs:
        - name: full
          type: boolean
          required: false
          default: false
          description: Whether to perform full reload or incremental update
      outputs:
        - name: refreshed
          type: boolean
          description: Whether refresh succeeded
        - name: timestamp
          type: datetime
          description: When refresh completed
      lifecycle:
        before:
          - checkIfDirty:
              handler: isDirty
              description: Check if refresh is needed
        main:
          - fetchFreshData:
              handler: loadData
              description: Fetch updated data from sources
          - rerender:
              handler: updateView
              description: Update UI or data representation
        after:
          - notifyParent:
              handler: emitRefresh
              description: Notify parent/orchestrator of refresh
        error:
          - useStaleData:
              handler: fallbackToCache
              description: Fall back to cached data on failure

  # 4. AUTHORIZEACCESS - Validate JWT and determine permissions
  - AuthorizeAccess:
      type: platform
      description: Validates JWT token and determines user/agent permissions for MFE access
      handler: checkAuthorization
      inputs:
        - name: token
          type: jwt
          required: true
          description: JWT token to validate
        - name: context
          type: object
          required: false
          description: Additional context for authorization decision
      outputs:
        - name: authorized
          type: boolean
          description: Whether access is granted
        - name: permissions
          type: array
          description: List of granted permissions
      lifecycle:
        before:
          - validateTokenFormat:
              handler: checkFormat
              description: Validate JWT structure
        main:
          - verifySignature:
              handler: verifyJWT
              description: Verify JWT signature
          - checkPermissions:
              handler: evaluatePermissions
              description: Check if token has required permissions
        after:
          - cacheResult:
              handler: cacheAuthResult
              description: Cache authorization result for performance
        error:
          - denyAccess:
              handler: returnUnauthorized
              description: Return 401/403 response

  # 5. HEALTH - Report operational status
  - Health:
      type: platform
      description: Report MFE health status and operational metrics
      handler: checkHealth
      outputs:
        - name: status
          type: enum
          values: [healthy, degraded, unhealthy]
          description: Overall health status
        - name: details
          type: object
          description: Detailed health information
        - name: timestamp
          type: datetime
          description: When health check was performed
      lifecycle:
        main:
          - checkDependencies:
              handler: verifyDependencies
              description: Check if dependencies are available
          - checkResources:
              handler: verifyResources
              description: Check resource availability (memory, connections)
        error:
          - reportUnhealthy:
              handler: returnUnhealthy
              description: Report unhealthy status

  # 6. DESCRIBE - Self-description and introspection
  - Describe:
      type: platform
      description: Return full DSL manifest and runtime information
      handler: describeSelf
      outputs:
        - name: dsl
          type: object
          description: Complete DSL document
        - name: runtime
          type: object
          description: Runtime metadata (uptime, version, etc)
      lifecycle:
        main:
          - loadDSL:
              handler: fetchDSL
              description: Load DSL manifest
          - gatherRuntimeInfo:
              handler: collectRuntimeData
              description: Gather runtime metrics and info

  # 7. SCHEMA - GraphQL schema introspection
  - Schema:
      type: platform
      description: Return GraphQL schema for data/capability introspection
      handler: introspectSchema
      outputs:
        - name: schema
          type: string
          format: graphql-sdl
          description: GraphQL schema in SDL format
      lifecycle:
        main:
          - generateSchema:
              handler: buildSchema
              description: Generate or retrieve GraphQL schema

  # 8. QUERY - Execute GraphQL queries
  - Query:
      type: platform
      description: Execute GraphQL query against MFE data or capabilities
      handler: executeQuery
      inputs:
        - name: token
          type: jwt
          required: true
          description: JWT for authorization
        - name: query
          type: string
          format: graphql-query
          required: true
          description: GraphQL query string
        - name: variables
          type: object
          required: false
          description: Query variables
      outputs:
        - name: data
          type: object
          description: Query results
        - name: errors
          type: array
          description: Any errors encountered
      lifecycle:
        before:
          - authorizeAccess:
              handler: checkAuth
              description: Verify authorization
          - validateQuery:
              handler: parseAndValidate
              description: Validate GraphQL query syntax
        main:
          - executeGraphQL:
              handler: runQuery
              description: Execute query against schema
        after:
          - cacheIfApplicable:
              handler: cacheResult
              description: Cache results if appropriate
        error:
          - emitErrorEvent:
              handler: emitError
              description: Send error event via emit capability (mandatory, contained)
              mandatory: true
              contained: true
          - emitFailureMetrics:
              handler: emitMetrics
              description: Send failure metrics via emit capability (mandatory, contained)
              mandatory: true
              contained: true
          - cleanup:
              handler: formatGraphQLError
              description: Format errors per GraphQL spec (mandatory, contained)
              mandatory: true
              contained: true

  # 9. EMIT - Generic event/telemetry emission
  - Emit:
      type: platform
      description: Generic event and telemetry emission for all MFE events (errors, metrics, traces, logs)
      handler: emitEvent
      inputs:
        - name: eventType
          type: enum
          values: [error, metric, trace, log, custom]
          required: true
          description: Type of event being emitted
        - name: eventData
          type: object
          required: true
          description: Event payload (format varies by eventType)
        - name: severity
          type: enum
          values: [debug, info, warn, error, critical]
          required: false
          default: info
          description: Event severity level
        - name: tags
          type: array
          required: false
          description: Additional tags for filtering/grouping
      outputs:
        - name: emitted
          type: boolean
          description: Whether event was successfully emitted
        - name: eventId
          type: string
          description: Unique identifier for emitted event
      lifecycle:
        before:
          - validateEvent:
              handler: checkEventFormat
              description: Validate event structure and data
        main:
          - sendToTelemetry:
              handler: dispatchEvent
              description: Send event to telemetry backend (e.g., DataDog, Prometheus, custom)
        after:
          - confirmDelivery:
              handler: verifyEmission
              description: Confirm event was received by telemetry backend
        error:
          - emitErrorEvent:
              handler: emitSelfError
              description: Emit error about emit failure (uses fallback)
              mandatory: true
              contained: true
          - emitFailureMetrics:
              handler: emitSelfMetrics
              description: Track emit failure metrics
              mandatory: true
              contained: true
          - cleanup:
              handler: logLocallyAsBackup
              description: Log event locally as backup when telemetry fails
              mandatory: true
              contained: true

  # =============================================================================
  # DOMAIN-SPECIFIC CAPABILITIES (Custom to this MFE)
  # =============================================================================
  # Domain capabilities describe WHAT this MFE provides, not WHERE files are.
  # CLI generates file structure from capability names:
  #   - src/remote.tsx exports all capabilities with lazy loading
  #   - src/features/{CapabilityName}/ created for each capability
  #   - src/platform/api.ts auto-generates RTK Query hooks from data.sources[]
  #
  # Each capability becomes an exposed function in remote.tsx:
  #   export const DataAnalysis = React.lazy(() => import('./features/DataAnalysis'));
  #
  # MFE teams implement features in src/features/{Name}/{Name}.tsx
  # Platform code (handlers/hooks) auto-generated in src/platform/
  
  # Simple capability - just name and description (minimal for code generation)
  - DataAnalysis:
      type: domain
      description: Analyze CSV files and generate statistical summaries

  # Another simple capability
  - ReportViewer:
      type: domain
      description: View and export analysis reports

  # Detailed capability with full lifecycle (optional - for documentation)
  - DataAnalysisDetailed:
      type: domain
      description: Analyze CSV files and generate statistical summaries
      handler: analyzeFile
      inputs:
        - name: file
          type: file
          formats: [csv, tsv]
          required: true
          description: File to analyze
        - name: analysisType
          type: enum
          values: [summary, correlation, regression]
          required: false
          default: summary
          description: Type of analysis to perform
      outputs:
        - name: report
          type: object
          description: Analysis results
          schema:
            summary:
              rowCount: number
              columnCount: number
              columns: array
            statistics:
              mean: object
              median: object
              stdDev: object
        - name: metadata
          type: object
          description: Analysis metadata
      lifecycle:
        # before/after/error: handlers run sequentially, failures logged but don't stop execution (OR-like)
        # main: handlers run sequentially, first failure stops and propagates (AND-like)
        before:
          # handler can be single string or array of functions
          - validateFile:
              handler: [validateCsvFile, checkFileSize, scanForMalicious]
              description: Validate file format, size, and security
          - checkQuota:
              handler: verifyUserQuota
              description: Check if user has quota for analysis
        main:
          # main phase handlers are AND - all must succeed, first failure stops execution
          - processData:
              handler: [parseCsv, cleanDataset, detectOutliers, performAnalysis]
              description: Parse, clean, detect outliers, and analyze data
        after:
          - completeAnalysis:
              handler: [createAnalysisReport, sendNotification]
              description: Format results and notify user
        error:
          - handleError:
              handler: logAndNotifyError
              description: Log error and notify user
# =============================================================================
# DATA LAYER - GraphQL Mesh Configuration (ADR-046)
# =============================================================================
# The data section IS the GraphQL Mesh configuration - single source of truth.
# CLI extracts this section to .meshrc.yaml and runs `mesh build`.
# Mesh provides pure passthrough from GraphQL to REST APIs.
data:
  # ===========================================================================
  # SOURCES - One or more OpenAPI specs merged into unified GraphQL schema
  # ===========================================================================
  sources:
    # Primary API for this MFE
    - name: AnalysisAPI
      handler:
        openapi:
          source: ./cost-benefit-api.yaml
          # JWT forwarding - context populated by Express middleware
          operationHeaders:
            Authorization: "Bearer {context.jwt}"
            X-Request-ID: "{context.requestId}"
            X-User-ID: "{context.userId}"
    
    # Additional APIs can be merged into unified schema
    - name: Pet Store API
      handler:
        openapi:
          source: ./pet-store-api.yaml
          operationHeaders:
            Authorization: "Bearer {context.jwt}"
      
  # ===========================================================================
  # TRANSFORMS - Shape the unified GraphQL schema (optional)
  # ===========================================================================

    
    # Fix naming conventions from OpenAPI
    # - rename:
    #     renames:
    #       - from:
    #           type: Query
    #           field: API_V1_GetAnalysis
    #         to:
    #           type: Query
    #           field: getAnalysis
    
    # Namespace to avoid conflicts with other sources
    # - prefix:
    #     value: Analysis_
    #     includeRootOperations: true

  # ===========================================================================
  # PLUGINS - Production concerns (optional)
  # ===========================================================================
  plugins:
    # Response caching
    - responseCache:
        ttl: 60000  # 1 minute
        # cacheKey: "{context.userId}:{operationName}"
        invalidateViaMutation: true
    
    # Rate limiting
    # - rateLimit:
    #     config:
    #       - type: Query
    #         field: '*'
    #         max: 100
    #         window: '1m'
    #       - type: Mutation
    #         field: '*'
    #         max: 20
    #         window: '1m'
    
    # Query depth limiting (prevent abuse)
    # - depthLimit:
    #     maxDepth: 10
    
    # Prometheus metrics
    # - prometheus:
    #     endpoint: /metrics

  # ===========================================================================
  # SERVE - GraphQL server configuration
  # ===========================================================================
  serve:
    endpoint: /graphql
    playground: true  # Disable in production
    # cors:
    #   origin: '*'
    #   credentials: true

  # ===========================================================================
  # DATA LINEAGE (DEC-024, ADR-045)
  # ===========================================================================
  # Tracks source of data for dependency analysis and impact assessment
  # Registry can query: "Which MFEs use this API?"
  generatedFrom:
    - openapi: ./specs/analysis-api.yaml
      service: analysis-api
      baseUrl: http://analysis-api:8080
      version: 2.1.0

# =============================================================================
# DEPENDENCIES
# =============================================================================
# Dependencies drive Module Federation shared config and package.json generation.
# CLI extracts these to generate rspack.config.js shared section.
dependencies:
  # Runtime dependencies - become Module Federation shared singletons
  runtime:
    react: ^18.0.0
    react-dom: ^18.0.0
  
  # Design system dependencies - also shared singletons
  design-system:
    '@mui/material': ^5.14.0
    '@emotion/react': ^11.11.0
    '@emotion/styled': ^11.11.0
  
  # Other MFE dependencies (future - for orchestrator validation)
  # mfes:
  #   user-service: ">=1.0.0"
  #   auth-service: "^2.1.0"
