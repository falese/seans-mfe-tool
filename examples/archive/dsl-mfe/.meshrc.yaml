# .meshrc.yaml - Auto-generated from DSL manifest data section
# REQ-BFF-001: DSL as Single Source of Truth
# ADR-046: GraphQL Mesh with DSL-embedded config
sources:
  - name: AnalysisAPI
    handler:
      openapi:
        source: ./specs/analysis-api.yaml
        operationHeaders:
          Authorization: Bearer {context.jwt}
          X-Request-ID: '{context.requestId}'
          X-User-ID: '{context.userId}'
transforms:
  - filterSchema:
      filters:
        - Query.!internal*
        - Mutation.!admin*
plugins:
  - responseCache:
      ttl: 60000
      invalidateViaMutation: true
  - rateLimit:
      config:
        - type: Query
          field: '*'
          max: 100
          window: 1m
        - type: Mutation
          field: '*'
          max: 20
          window: 1m
serve:
  endpoint: /graphql
  playground: true
generatedFrom:
  - openapi: ./specs/analysis-api.yaml
    service: analysis-api
    version: 2.1.0

