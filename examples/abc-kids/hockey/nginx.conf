server {
    listen 3002;
    root /usr/share/nginx/html;
    index index.html;

    location /remoteEntry.js {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-store";
    }

    location / {
        add_header Access-Control-Allow-Origin *;
        try_files $uri $uri/ /index.html;
    }
}
