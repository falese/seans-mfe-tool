# .meshrc.yaml - Auto-generated from DSL manifest data section
# REQ-BFF-001: DSL as Single Source of Truth
# ADR-046: GraphQL Mesh with DSL-embedded config
# ADR-062: Mesh v0.100.x with production plugins

# GraphQL Mesh Configuration
sources:
  - name: PetStoreAPI
    handler:
      openapi:
        source: ./specs/petstore.yaml
        operationHeaders:
          Authorization: Bearer {context.jwt}
          X-Request-ID: '{context.requestId}'
serve:
  endpoint: /graphql
  playground: true


# Plugins (Performance & Observability)
plugins:
  - responseCache:
      ttl: 300000
  
  - prometheus: {}


# Transforms (Schema Manipulation)
transforms:
  # Demo-mode mock switch (ADR-052): wraps Query.* so a request with
  # `x-bff-mode: mock` (or DEMO_MODE=true) returns fixtures from mocks.json.
  - resolversComposition:
      mode: bare
      compositions:
        - resolver: 'Query.*'
          composer: ./mock-switch#mockSwitch
  - namingConvention:
      typeNames: pascalCase
      fieldNames: camelCase

