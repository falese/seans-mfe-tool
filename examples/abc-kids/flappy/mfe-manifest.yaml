name: abc-kids-flappy
version: 1.0.0
type: remote
language: typescript
framework: react
bundler: rspack
description: Flappy Bird — tap to flap, avoid pipes, keep score!
owner: abc-kids-team
tags: [kids, game, flappy-bird, arcade]
category: games

endpoint: http://localhost:3001
remoteEntry: http://localhost:3001/remoteEntry.js
discovery: http://localhost:3001/.well-known/mfe-manifest.yaml

capabilities:
  - PlayGame:
      type: domain
      description: Play the Flappy Bird game on an HTML5 Canvas

  - ShowCover:
      type: domain
      description: Show the Flappy Bird game cover card with title and art

  - GetGameInfo:
      type: domain
      description: Return game metadata including title, age range, and description

  - Load:
      type: platform
      lifecycle:
        before:
          - detectExecutionContext:
              handler: detectExecutionContext
              source: ../../handlers/detectExecutionContext
              description: Detect shell vs standalone via URL origin (ADR-072)
          - onLoadBegin:
              handler: onLoadBegin
              description: Log load lifecycle entry
        after:
          - onLoadComplete:
              handler: onLoadComplete
              description: Log load success and available components
        error:
          - onLoadError:
              handler: onLoadError
              contained: true
              description: Log load failure

  - Render:
      type: platform
      lifecycle:
        before:
          - onRenderBegin:
              handler: onRenderBegin
              description: Log render lifecycle entry
        after:
          - onRenderComplete:
              handler: onRenderComplete
              description: Log render success
        error:
          - onRenderError:
              handler: onRenderError
              contained: true
              description: Log render failure

dependencies:
  runtime:
    react: ^18.2.0
    react-dom: ^18.2.0
  design-system:
    '@mui/material': ^5.14.0
    '@emotion/react': ^11.11.1
    '@emotion/styled': ^11.11.0
