# abc-kids-memory-match — hardened static MFE server block (remote).
# Runs under nginxinc/nginx-unprivileged (non-root). See ADR-044.
server {
    listen 3010;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/css text/javascript application/javascript application/json image/svg+xml;

    # Security headers (apply to the HTML document).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    # Module Federation entry — loaded cross-origin by the shell, never cached.
    location = /remoteEntry.js {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "no-store" always;
        expires -1;
        try_files $uri =404;
    }

    # Content-hashed assets cache aggressively.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        expires 1y;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }
}
