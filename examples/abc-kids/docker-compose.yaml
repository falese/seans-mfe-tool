services:
  # seans-mfe-tool-cli must be pre-built before running docker compose build.
  # Build it via: turbo run docker:build:cli  (or: npm run docker:build:cli)
  # The Turborepo task graph (docker:build:examples) handles the full chain:
  #   npm run build → docker:build:cli → docker compose build (MFE services)
  # depends_on below ensures this image is present before MFE containers start.
  seans-mfe-tool-cli:
    image: seans-mfe-tool-cli:latest

  abc-kids-flappy:
    build:
      context: ./flappy
      dockerfile: Dockerfile
    depends_on:
      - seans-mfe-tool-cli
    ports:
      - '3001:3001'
    environment:
      # BFF + static assets served together on 3001 so the shell can reach
      # both remoteEntry.js and /graphql at the same origin (localhost:3001).
      - PORT=3001
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  abc-kids-hockey:
    build:
      context: ./hockey
      dockerfile: Dockerfile
    depends_on:
      - seans-mfe-tool-cli
    ports:
      - '3002:3002'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3002/remoteEntry.js']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  abc-kids-multiplication-quiz:
    build:
      context: ./multiplication-quiz
      dockerfile: Dockerfile
    depends_on:
      - seans-mfe-tool-cli
    ports:
      - '3003:3003'
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3003/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  abc-kids-shell:
    build:
      context: ./shell
      dockerfile: Dockerfile
    depends_on:
      seans-mfe-tool-cli:
        condition: service_started
      abc-kids-flappy:
        condition: service_healthy
      abc-kids-hockey:
        condition: service_healthy
      abc-kids-multiplication-quiz:
        condition: service_healthy
    ports:
      - '3000:3000'
