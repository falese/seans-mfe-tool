services:
  abc-kids-flappy:
    build:
      context: ../..
      dockerfile: examples/abc-kids/flappy/Dockerfile
    ports:
      - '3001:3001'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3001/remoteEntry.js']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  abc-kids-hockey:
    build:
      context: ../..
      dockerfile: examples/abc-kids/hockey/Dockerfile
    ports:
      - '3002:3002'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3002/remoteEntry.js']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  abc-kids-multiplication-quiz:
    build:
      context: ../.. 
      dockerfile: examples/abc-kids/multiplication-quiz/Dockerfile
    ports:
      - '3003:3003'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3003/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  abc-kids-shell:
    build:
      context: ./shell
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      abc-kids-flappy:
        condition: service_healthy
      abc-kids-hockey:
        condition: service_healthy
      abc-kids-multiplication-quiz:
        condition: service_healthy
