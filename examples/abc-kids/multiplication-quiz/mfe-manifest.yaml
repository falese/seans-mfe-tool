name: abc-kids-multiplication-quiz
version: 1.0.0
type: remote
language: typescript
framework: angular
bundler: webpack
description: Multiplication Quiz — a cat and a dog take turns asking multiplication questions!
owner: abc-kids-team
tags: [kids, game, math, multiplication, quiz]
category: games

endpoint: http://localhost:3003
remoteEntry: http://localhost:3003/remoteEntry.js
discovery: http://localhost:3003/.well-known/mfe-manifest.yaml

capabilities:
  - PlayGame:
      type: domain
      description: Play the multiplication quiz game with cat and dog characters

  - ShowCover:
      type: domain
      description: Show the multiplication quiz cover card with cat and dog art

  - GetGameInfo:
      type: domain
      description: Return game metadata including title, age range, and description

  - Load:
      type: platform
      lifecycle:
        before:
          - onLoadBegin:
              handler: onLoadBegin
              description: Log load lifecycle entry
        after:
          - onLoadComplete:
              handler: onLoadComplete
              description: Log load success and available components
        error:
          - onLoadError:
              handler: onLoadError
              contained: true
              description: Log load failure

  - Render:
      type: platform
      lifecycle:
        before:
          - onRenderBegin:
              handler: onRenderBegin
              description: Log render lifecycle entry
        after:
          - onRenderComplete:
              handler: onRenderComplete
              description: Log render success
        error:
          - onRenderError:
              handler: onRenderError
              contained: true
              description: Log render failure

data:
  sources:
    - name: PetStoreAPI
      handler:
        openapi:
          source: ./specs/petstore.yaml
          operationHeaders:
            Authorization: 'Bearer {context.jwt}'
            X-Request-ID: '{context.requestId}'
  mockSwitch:
    enabled: true
  serve:
    endpoint: /graphql
    playground: true

dependencies:
  runtime:
    '@angular/core': ^17.0.0
    '@angular/common': ^17.0.0
    '@angular/platform-browser': ^17.0.0
    rxjs: ^7.8.0
    zone.js: ~0.14.0
