# Full-Featured MFE Manifest Example (ADR-062)
# This example demonstrates all production features including
# performance optimization, observability, and custom transforms

name: mfe1
version: 1.0.0
type: tool
language: typescript
description: new MFE using new DSL
owner: seans-mfe-tool-team
tags: [data-new, dsl, display dsl]
category: data-awesome

endpoint: http://localhost:3002
remoteEntry: http://localhost:3002/remoteEntry.js
discovery: http://localhost:3002/.well-known/mfe-manifest.yaml

# =============================================================================
# CAPABILITIES
# =============================================================================
capabilities:
  # Platform capabilities (required)
  - Load:
      type: platform
      description: Initialize the analyzer module

  - Render:
      type: platform
      description: Render the analyzer UI

  # Domain capabilities (custom)
  - HomePage:
      type: domain
      description: provide the MFE as a homepage
  - IconView:
      type: domain
      description: View this MFE as an icon
  - CatalogView:
      type: domain
      description: View this MFE as a catalog
# =============================================================================
# DATA LAYER (GraphQL Mesh BFF)
# =============================================================================
data:
  sources:
    # 1. HTTPBin - OpenAPI Handler (HTTP testing service) - COMMENTED OUT: spec returns HTML
    # - name: HTTPBinAPI
    #   handler:
    #     type: openapi
    #     source: https://httpbin.org/spec.json
    #     operationHeaders:
    #       Content-Type: application/json
    
    # 2. SpaceX GraphQL - GraphQL Handler (native GraphQL endpoint)
    - name: SpaceXAPI
      handler:
        type: graphql
        endpoint: https://spacex-production.up.railway.app/
        operationHeaders:
          Content-Type: application/json
    
    # 3. JSONPlaceholder - JSON Schema Handler (simple REST API)
    - name: JSONPlaceholder
      handler:
        type: jsonSchema
        endpoint: https://jsonplaceholder.typicode.com
        operations:
          - field: getUsers
            path: /users
            method: GET
            type: query
            responseSchema:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  username:
                    type: string
                  email:
                    type: string
                  phone:
                    type: string
                  website:
                    type: string
          - field: getUser
            path: /users/{args.id}
            method: GET
            type: query
          - field: getPosts
            path: /posts
            method: GET
            type: query
          - field: createPost
            path: /posts
            method: POST
            type: mutation
      
      # Transform field names
      transforms:
        - type: rename
          rename:
            mode: bare
            renames:
              # Rename email → assignedTo
              - from:
                  type: query_getUsers_items
                  field: email
                to:
                  type: query_getUsers_items
                  field: assignedTo
              # Rename username → handle
              - from:
                  type: query_getUsers_items
                  field: username
                to:
                  type: query_getUsers_items
                  field: handle
    
    # 4. ReqRes - JSON Schema Handler (user management API)
    - name: ReqResAPI
      handler:
        type: jsonSchema
        endpoint: https://reqres.in/api
        operations:
          - field: listUsers
            path: /users
            method: GET
            type: query
          - field: getUser
            path: /users/{args.id}
            method: GET
            type: query
          - field: createUser
            path: /users
            method: POST
            type: mutation

  serve:
    endpoint: /graphql
    playground: true

  # generatedFrom:
