name: meridian-cargo-ops
version: 1.0.0
type: remote
language: typescript
framework: angular
bundler: webpack
description: Meridian Station cargo operations — manifests with valuations, hazard summary
owner: meridian-station
tags: [meridian, cargo, ops, angular]
category: operations

endpoint: http://localhost:5004
remoteEntry: http://localhost:5004/remoteEntry.js
discovery: http://localhost:5004/.well-known/mfe-manifest.yaml

capabilities:
  - CargoManifest:
      type: domain
      description: The flagship split-document view — Harbormaster manifest lines joined with StellarLedger valuations, gaps included

  - HazardSummary:
      type: domain
      description: Hazardous cargo currently on station, by hazard class

  - Load:
      type: platform
      lifecycle:
        before:
          - onLoadBegin:
              handler: onLoadBegin
              description: Log load lifecycle entry
        after:
          - onLoadComplete:
              handler: onLoadComplete
              description: Log load success and available components
        error:
          - onLoadError:
              handler: onLoadError
              contained: true
              description: Log load failure

  - Render:
      type: platform
      lifecycle:
        before:
          - onRenderBegin:
              handler: onRenderBegin
              description: Log render lifecycle entry
        after:
          - onRenderComplete:
              handler: onRenderComplete
              description: Log render success
        error:
          - onRenderError:
              handler: onRenderError
              contained: true
              description: Log render failure

# Two-source BFF: the cargo manifest is ONE logical document split across
# two systems by organizational accident — header lines in the harbormaster
# (customs), valuations in the ledger (finance). hoistField unwraps the
# ledger envelope; the join key is the finance team's invented composite
# ref DCK-004021/7.
data:
  sources:
    - name: Harbormaster
      handler:
        openapi:
          source: ./specs/harbormaster.yaml
    - name: StellarLedger
      handler:
        openapi:
          source: ./specs/stellar-ledger.yaml
      transforms:
        - hoistField:
            - typeName: Query
              pathConfig: [listValuations, result]
              newFieldName: valuations
  mockSwitch:
    enabled: true
  serve:
    endpoint: /graphql
    playground: true

dependencies:
  runtime:
    "@angular/core": ^19.2.16
    "@angular/common": ^19.2.16
    "@angular/platform-browser": ^19.2.16
    rxjs: ^7.8.0
    zone.js: ~0.14.0
