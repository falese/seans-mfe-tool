name: meridian-life-support
version: 1.0.0
type: remote
language: typescript
framework: angular
bundler: webpack
description: Meridian Station life support — telemetry dashboard, module status, alerts
owner: meridian-station
tags: [meridian, life-support, ops, angular]
category: operations

endpoint: http://localhost:5003
remoteEntry: http://localhost:5003/remoteEntry.js
discovery: http://localhost:5003/.well-known/mfe-manifest.yaml

capabilities:
  - TelemetryDashboard:
      type: domain
      description: Full telemetry board — every module's environmental readings from StationOS

  - ModuleStatus:
      type: domain
      description: Compact per-module status card for the console status rail

  - AlertsFeed:
      type: domain
      description: Readings at WATCH or CRITICAL alert level, newest first

  - Load:
      type: platform
      lifecycle:
        before:
          - onLoadBegin:
              handler: onLoadBegin
              description: Log load lifecycle entry
        after:
          - onLoadComplete:
              handler: onLoadComplete
              description: Log load success and available components
        error:
          - onLoadError:
              handler: onLoadError
              contained: true
              description: Log load failure

  - Render:
      type: platform
      lifecycle:
        before:
          - onRenderBegin:
              handler: onRenderBegin
              description: Log render lifecycle entry
        after:
          - onRenderComplete:
              handler: onRenderComplete
              description: Log render success
        error:
          - onRenderError:
              handler: onRenderError
              contained: true
              description: Log render failure

# Single-source BFF — the deliberate contrast case: StationOS only.
# The {Data, Pagination} envelope unwraps at the graph via hoistField,
# PascalCase fields camelCase via the always-on namingConvention transform.
data:
  sources:
    - name: StationOS
      handler:
        openapi:
          source: ./specs/station-os.yaml
      transforms:
        - hoistField:
            - typeName: Query
              pathConfig: [GetTelemetry, Data]
              newFieldName: telemetry
            - typeName: Query
              pathConfig: [GetModules, Data]
              newFieldName: modules
  mockSwitch:
    enabled: true
  serve:
    endpoint: /graphql
    playground: true

dependencies:
  runtime:
    "@angular/core": ^19.2.16
    "@angular/common": ^19.2.16
    "@angular/platform-browser": ^19.2.16
    rxjs: ^7.8.0
    zone.js: ~0.14.0
