# new-dsl BFF - Docker Compose
# Generated by seans-mfe-tool
# Following ADR-046: GraphQL Mesh with DSL-embedded configuration

version: '3.8'

services:
  new-dsl:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4002:4002"
    environment:
      - NODE_ENV=development
      - PORT=4002
      - CORS_ORIGIN=*
    volumes:
      # Mount source for development hot reload
      - ./src:/app/src:ro
      - ./specs:/app/specs:ro
      - ./.meshrc.yaml:/app/.meshrc.yaml:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4002/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Optional: Redis for response caching (REQ-BFF-006)
  # Uncomment if using @graphql-mesh/plugin-response-cache with Redis
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 3

# volumes:
#   redis_data:

networks:
  default:
    name: new-dsl-network
