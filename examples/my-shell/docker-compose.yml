# my_shell — Docker Compose
# Generated by seans-mfe-tool (ADR-016, ADR-017)
#
# Four-tier control plane:
#   registry   (port 4000) — rules engine; publishes Component events
#   daemon     (port 3001) — message broker; bridges registry ↔ renderers
#   shell      (port 3000) — React host; MFE renderer connected to daemon
#   redis      (port 6379) — optional PubSub backend for multi-instance daemons
#
# Data flow:
#   Remote MFE → updateControlPlaneState() → daemon → registry
#   Registry rule fires → componentUpdate subscription → daemon → shell renderer
#   Shell renderer → Module Federation import(type/App) → renders MFE
#
# Usage:
#   docker-compose up -d          # start all four services
#   docker-compose logs -f daemon # tail daemon logs
#   # then start your remote MFEs separately with npm run dev

services:
  registry:
    build:
      context: ./orchestration/registry
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - COMPONENT_TTL_MS=600000
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  daemon:
    build:
      context: ./orchestration/daemon
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - REGISTRY_HOST=registry
      - REGISTRY_PORT=4000
      - REGISTRY_WS_URL=ws://registry:4000/graphql
      - LOG_JSON=1
    depends_on:
      registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  shell:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DAEMON_WS_URL=ws://daemon:3001/graphql
    depends_on:
      daemon:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  redis_data:

networks:
  default:
    name: my_shell-network
