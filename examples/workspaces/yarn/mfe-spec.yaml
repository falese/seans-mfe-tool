# Module Federation Specification (Example - yarn)
workspace:
  name: yarn-workspace
  packageManager: yarn

shell:
  name: main-shell
  port: 3000
  description: Main container application

remotes:
  - name: dashboard
    port: 3001
    description: Dashboard MFE
    exposedComponents:
      - name: Dashboard
        path: ./src/Dashboard
  - name: user-profile
    port: 3002
    description: User profile MFE
    exposedComponents:
      - name: Profile
        path: ./src/Profile

apis:
  - name: user-api
    port: 4001
    spec: ./specs/user-api.yaml
    database: sqlite
    description: User management API

shared:
  packages:
    - react
    - react-dom
    - '@mui/material'
