# Full-Featured MFE Manifest Example (ADR-062)
# This example demonstrates all production features including
# performance optimization, observability, and custom transforms

name: csv-analyzer
version: 1.0.0
type: tool
language: typescript
description: CSV data analysis with production-grade GraphQL BFF
owner: analytics-team
tags: [data-analysis, csv, statistics]
category: data-processing

endpoint: http://localhost:3002
remoteEntry: http://localhost:3002/remoteEntry.js
discovery: http://localhost:3002/.well-known/mfe-manifest.yaml

# =============================================================================
# CAPABILITIES
# =============================================================================
capabilities:
  # Platform capabilities (required)
  - load:
      type: platform
      description: Initialize the analyzer module

  - render:
      type: platform
      description: Render the analyzer UI

  # Domain capabilities (custom)
  - DataAnalysis:
      type: domain
      description: Analyze CSV files and generate reports

  - ReportViewer:
      type: domain
      description: View and export analysis reports

# =============================================================================
# DATA LAYER (GraphQL Mesh BFF)
# =============================================================================
data:
  sources:
    - name: AnalysisAPI
      handler:
        openapi:
          source: ./specs/analysis-api.yaml
          operationHeaders:
            Authorization: "Bearer {context.jwt}"
            X-Request-ID: "{context.requestId}"
            X-User-ID: "{context.userId}"

  serve:
    endpoint: /graphql
    playground: true

  generatedFrom:
    - openapi: ./specs/analysis-api.yaml
      service: analysis-api
      baseUrl: http://analysis-api:8080
      version: 2.1.0

# =============================================================================
# PERFORMANCE & OBSERVABILITY (ADR-062)
# =============================================================================
performance:
  # Response caching (enabled by default)
  caching:
    enabled: true
    ttl: 300000  # 5 minutes default
    strategies:
      # Cache user queries for 1 minute
      - type: Query
        field: getUser
        ttl: 60000
      # Cache analysis results for 10 minutes
      - type: Query
        field: getAnalysis
        ttl: 600000
      # Cache report lists for 5 minutes
      - type: Query
        field: listReports
        ttl: 300000

  # Observability configuration
  observability:
    # Prometheus metrics (enabled by default for production)
    prometheus:
      enabled: true
      port: 9090
      endpoint: /metrics

    # OpenTelemetry distributed tracing (opt-in)
    opentelemetry:
      enabled: true
      serviceName: csv-analyzer-bff
      sampling:
        probability: 0.1  # Sample 10% of requests
      exporters:
        - type: jaeger
          endpoint: http://jaeger:14268/api/traces

  # Rate limiting (opt-in for public APIs)
  rateLimit:
    enabled: true
    config:
      # Limit queries to 100/min per user
      - type: Query
        field: '*'
        max: 100
        ttl: 60000
        identifyContext: userId
      # Limit mutations to 20/min per user
      - type: Mutation
        field: '*'
        max: 20
        ttl: 60000
        identifyContext: userId
      # Stricter limit for expensive operations
      - type: Query
        field: generateReport
        max: 10
        ttl: 60000
        identifyContext: userId

  # Schema filtering (hide internal fields)
  filterSchema:
    enabled: true
    filters:
      - Query.!internal*       # Remove internal queries
      - Mutation.!admin*       # Remove admin mutations
      - Type.!_internal*       # Remove internal types
      - Type.!_metadata        # Remove metadata fields

# =============================================================================
# CUSTOM TRANSFORMS (ADR-062)
# =============================================================================
# Define custom resolver composition for field-level logic
transforms:
  # Authentication check for user queries
  - |
    resolver: Query.getUser
    composer: ./src/platform/bff/composers/auth-check#authCheck

  # Authentication check for all user-related queries
  - |
    resolver: Query.{getUser,updateUser,deleteUser}
    composer: ./src/platform/bff/composers/auth-check#authCheck

  # Audit logging for all mutations
  - |
    resolver: Mutation.*
    composer: ./src/platform/bff/composers/audit-log#auditLog

  # Rate limiting for expensive operations
  - |
    resolver: Query.generateReport
    composer: ./src/platform/bff/composers/rate-limit#rateLimitExpensive

  # Data masking for sensitive fields
  - |
    resolver: Query.{getUser,listUsers}
    composer: ./src/platform/bff/composers/data-mask#maskSensitiveData

# =============================================================================
# DEPENDENCIES
# =============================================================================
dependencies:
  runtime:
    react: ^18.2.0
    react-dom: ^18.2.0

  design-system:
    '@mui/material': ^5.14.0
    '@emotion/react': ^11.11.1
    '@emotion/styled': ^11.11.0
